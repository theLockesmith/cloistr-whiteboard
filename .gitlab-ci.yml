stages:
  - build
  - smoke

include:
  - project: 'coldforge/ci-templates'
    ref: main
    file: '/templates/kaniko-build.yml'
  - project: 'coldforge/ci-templates'
    ref: main
    file: '/templates/frontend-smoke.yml'

build:
  extends: .kaniko-build
  stage: build
  variables:
    KANIKO_EXTRA_FLAGS: "--build-arg=NPM_TOKEN=${CI_JOB_TOKEN}"

# Smoke-test: load built image in real Chromium, fail on console errors / blank page
smoke-test:
  extends: .smoke-test
  needs: ["build"]
